name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          HOGAN_CHAMPION_MODE: "true"
          HOGAN_PAPER_MODE: "true"
        run: |
          python -m pytest tests/ -v --tb=short -x -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting, imports, and bugbear hygiene
        run: ruff check hogan_bot/ tests/ scripts/ diagnostics/ --select E,F,I,B007,B904 --ignore E501

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hogan-bot:ci .

      - name: Smoke-test image contents
        run: docker run --rm --entrypoint python hogan-bot:ci -m compileall -q hogan_bot scripts diagnostics

      - name: Prepare image tags
        id: image
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${image}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${image}:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag hogan-bot:ci "${{ steps.image.outputs.sha_tag }}"
          docker tag hogan-bot:ci "${{ steps.image.outputs.latest_tag }}"
          docker push "${{ steps.image.outputs.sha_tag }}"
          docker push "${{ steps.image.outputs.latest_tag }}"

      - name: Prepare Compose environment
        run: |
          cat > .env <<'EOF'
          HOGAN_PAPER_MODE=true
          HOGAN_LIVE_MODE=false
          HOGAN_LIVE_ACK=false
          HOGAN_METRICS_PORT=8000
          HOGAN_STORAGE_BACKEND=sqlite
          POSTGRES_DB=hogan
          POSTGRES_USER=hogan
          POSTGRES_PASSWORD=ci-postgres-password
          GRAFANA_ADMIN_PASSWORD=ci-grafana-password
          EOF

      - name: Validate Compose configuration
        env:
          POSTGRES_DB: hogan
          POSTGRES_USER: hogan
          POSTGRES_PASSWORD: ci-postgres-password
          GRAFANA_ADMIN_PASSWORD: ci-grafana-password
          HOGAN_BOT_IMAGE: ghcr.io/example/hogan:sha-ci
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
          docker compose -f monitoring/docker-compose.monitoring.yml config --quiet
